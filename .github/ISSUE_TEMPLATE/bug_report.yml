name: 🐛 Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Tortoise program that reproduces the issue
      description: A minimal, self-contained tortoise program.
      render: swift
      placeholder: |
        let 🐢 = Tortoise()
        🐢.penColor = .red
        🐢.forward(100)
        // ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected drawing / behavior
      description: What did you expect to see?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual drawing / behavior
      description: What actually happened? Screenshots or SVG output are very welcome.
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected module
      multiple: true
      options:
        - TortoiseCore
        - TortoiseUI
        - TortoiseSVG
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: TortoiseGraphics2 version
      placeholder: "2.0.0-beta5"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and version, Xcode version.
      placeholder: "macOS 26.1, Xcode 26.0"
    validations:
      required: true
