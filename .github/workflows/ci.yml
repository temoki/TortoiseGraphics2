name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    permissions:
      contents: read
      id-token: write  # Codecov upload via GitHub OIDC (no static token)
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        uses: ./.github/actions/select-xcode

      - name: Cache SwiftPM build directory
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-debug-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-debug-${{ runner.os }}-

      - name: Test
        run: swift test --enable-code-coverage

      - name: Export coverage (lcov)
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          xcrun llvm-cov export -format=lcov \
            -instr-profile "$BIN_PATH/codecov/default.profdata" \
            -ignore-filename-regex="\.build|Tests" \
            "$BIN_PATH/TortoiseGraphicsPackageTests.xctest/Contents/MacOS/TortoiseGraphicsPackageTests" \
            > coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          use_oidc: true
          fail_ci_if_error: false

  # Catches release-only compile issues (optimization, inlining) in a
  # parallel job, so the test job doesn't build everything twice.
  release-build:
    name: Release Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        uses: ./.github/actions/select-xcode

      - name: Cache SwiftPM build directory
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-release-${{ runner.os }}-

      - name: Build
        run: swift build -c release

  # Package.swift omits the SwiftUI-based TortoiseUI product/targets on Linux,
  # so plain `swift test` covers TortoiseCore + TortoiseSVG here.
  linux:
    name: Linux (Core + SVG)
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
      - uses: actions/checkout@v7

      - name: Cache SwiftPM build directory
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-linux-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-linux-

      - name: Test
        run: swift test

  format-lint:
    name: swift-format lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        uses: ./.github/actions/select-xcode

      - name: Lint
        run: xcrun swift-format lint --recursive --strict Sources Tests
