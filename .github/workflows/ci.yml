name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test --enable-code-coverage

      - name: Export coverage (lcov)
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          xcrun llvm-cov export -format=lcov \
            -instr-profile "$BIN_PATH/codecov/default.profdata" \
            -ignore-filename-regex="\.build|Tests" \
            "$BIN_PATH/TortoiseGraphicsPackageTests.xctest/Contents/MacOS/TortoiseGraphicsPackageTests" \
            > coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Package.swift omits the SwiftUI-based TortoiseUI product/targets on Linux,
  # so plain `swift build` / `swift test` covers TortoiseCore + TortoiseSVG here.
  linux:
    name: Linux (Core + SVG)
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

  format-lint:
    name: swift-format lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Lint
        run: xcrun swift-format lint --recursive --strict Sources Tests
