name: Docs

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build DocC
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Generate documentation
        run: |
          swift package --allow-writing-to-directory ./.docc-build \
            generate-documentation \
            --target TortoiseCore --target TortoiseUI --target TortoiseSVG \
            --enable-experimental-combined-documentation \
            --transform-for-static-hosting \
            --hosting-base-path TortoiseGraphics2 \
            --output-path ./.docc-build

      - name: Redirect site root to documentation landing page
        run: |
          echo '<!doctype html><html><head><meta http-equiv="refresh" content="0; url=documentation/"></head></html>' > ./.docc-build/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./.docc-build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
