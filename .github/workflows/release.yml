name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract this version's CHANGELOG section
        run: |
          awk -v ver="$GITHUB_REF_NAME" '
            $0 == "## " ver { found = 1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::CHANGELOG.md has no \"## $GITHUB_REF_NAME\" section — add it before tagging."
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        # --generate-notes appends the compare link and new-contributor list
        # below the CHANGELOG excerpt.
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --generate-notes \
            --verify-tag
